<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="%BASE_URL%logo.png" type="image/png" />
    <!-- No viewport-fit=cover: in a standalone PWA, cover makes content render
         UNDER the OS status bar, and Android Chrome reports safe-area-inset-top=0
         for a normal status bar — so the top bar hid behind it. Without cover the
         OS reserves the status-bar space and the header sits below it. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#1A5560" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- 'default' (not black-translucent) keeps iOS content below the status bar. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="%BASE_URL%inspect.webmanifest" />
    <title>Inspection — Contrôle Qualité</title>

    <!-- Inter (sans-serif) + JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Runtime config injected by Caddy at request time (under the app base) -->
    <script src="%BASE_URL%config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/inspect-main.tsx"></script>
  </body>
</html>
