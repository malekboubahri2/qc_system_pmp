name: Build & Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Never cancel a publish mid-flight — a partial push corrupts the manifest
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: qc-server
            context: ./server
            dockerfile: ./server/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qc-server
            context: ./server
            dockerfile: ./server/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: qc-dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: qc-dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      # Derive short arch tag (linux/arm64 → arm64) for cache scopes and
      # artifact names. Using shell expansion avoids fragile expression logic.
      - name: Derive arch
        id: arch
        run: echo "tag=${PLATFORM##*/}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          # push-by-digest: image lands in GHCR without a tag; the merge
          # job assembles the final multi-arch manifest from all digests.
          outputs: type=image,name=ghcr.io/${{ github.repository }}/${{ matrix.image }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ steps.arch.outputs.tag }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ steps.arch.outputs.tag }},mode=max
          provenance: false

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.push.outputs.digest }}" \
            > "/tmp/digests/${{ matrix.image }}-${{ steps.arch.outputs.tag }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ steps.arch.outputs.tag }}
          path: /tmp/digests/
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image: [qc-server, qc-dashboard]

    steps:
      # Download both arch digests for this image in one step.
      # actions/download-artifact@v4 merge-multiple flattens matching
      # artifacts (digest-<image>-amd64 + digest-<image>-arm64) into
      # a single directory.
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.image }}"
          AMD64=$(cat /tmp/digests/${{ matrix.image }}-amd64.txt)
          ARM64=$(cat /tmp/digests/${{ matrix.image }}-arm64.txt)

          TAG_ARGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create "${TAG_ARGS[@]}" \
            "${IMAGE}@${AMD64}" \
            "${IMAGE}@${ARM64}"
