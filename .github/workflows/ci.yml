name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy app
        continue-on-error: true  # advisory at PoC scale

      - name: Apply migrations (sanity check)
        env:
          DATABASE_URL: sqlite:///./ci-test.db
        run: uv run alembic upgrade head

      - name: Run pytest
        env:
          JWT_SECRET: ci-ephemeral-secret-do-not-use-in-prod
          MQTT_HOST: localhost
          MQTT_PORT: 1883
          MQTT_USERNAME: ci-test
          MQTT_PASSWORD: ci-test
          LOG_LEVEL: WARNING
        run: uv run pytest -v --tb=short

  dashboard-tests:
    name: Dashboard (vitest + tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint
        continue-on-error: true  # advisory at PoC scale

      - name: Tests
        run: pnpm test -- --run

      - name: Production build (catches build-time errors)
        run: pnpm run build
