---
# Painting QC — local development stack
# Usage: docker compose -f infra/docker-compose.dev.yml up --build
#
# Requires infra/.env (copy from infra/.env.example).
# Mosquitto passwd file must be bootstrapped first — see docs/deployment.md §5.

networks:
  qc-net:
    driver: bridge

volumes:
  qc-data:         # SQLite database
  mosquitto-data:  # Mosquitto persistence (retained messages)
  mosquitto-cfg:   # Writable config dir — populated by entrypoint from bind-mounts
  caddy-data:      # Caddy internal CA + certs (stable root across restarts)

services:

  # ── MQTT broker ───────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    # On Docker Desktop / Windows, bind-mounted files land as root:root 600,
    # which mosquitto (running as the mosquitto user) cannot read.
    # Workaround: mount source files to a staging path, then use an entrypoint
    # that copies them into a writable named volume with correct ownership
    # before handing off to the real mosquitto process.
    entrypoint:
      - sh
      - -c
      - |
        cp /etc/mosquitto-src/mosquitto.conf /mosquitto/config/mosquitto.conf
        cp /etc/mosquitto-src/acl.conf /mosquitto/config/acl.conf
        cp /etc/mosquitto-src/passwd /mosquitto/config/passwd
        chown -R mosquitto:mosquitto /mosquitto/config
        chmod 640 /mosquitto/config/passwd
        mkdir -p /mosquitto/log
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/etc/mosquitto-src/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/etc/mosquitto-src/acl.conf:ro
      - ./mosquitto/passwd:/etc/mosquitto-src/passwd:ro
      - mosquitto-cfg:/mosquitto/config
      - mosquitto-data:/mosquitto/data
    ports:
      - "1883:1883"
    networks:
      - qc-net
    environment:
      # Exposed to the container so the healthcheck can authenticate.
      MQTT_SERVER_PASSWORD: ${MQTT_SERVER_PASSWORD:-change-me}
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mosquitto_pub
          -h 127.0.0.1 -p 1883
          -u qc-server -P "$$MQTT_SERVER_PASSWORD"
          -t qc/config/health -m ""
          2>/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  # ── FastAPI server ────────────────────────────────────────────
  qc-server:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: runtime
    # Override CMD for hot-reload in dev; migrations still run first.
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../server/app:/app/app  # bind-mount source for --reload
      # Mount migrations too so `alembic upgrade head` (run on container start)
      # picks up new revisions after a `git pull` — without a server rebuild.
      - ../server/alembic:/app/alembic
      - qc-data:/var/lib/qc
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    networks:
      - qc-net
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Dashboard (Caddy serving built SPA) ──────────────────────
  qc-dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    environment:
      API_HOST: qc-server:8000
      PLANT_NAME: ${PLANT_NAME:-Plant 1}
      LOCALE: ${LOCALE:-fr-TN}
      # Hostname Caddy serves the public andon dashboard on.
      ANDON_DOMAIN: ${ANDON_DOMAIN:-andon.pmp.com}
    ports:
      - "8080:80"
      - "443:443"   # HTTPS (Caddy internal CA) for the installable kiosk PWA
    volumes:
      - caddy-data:/data   # persist Caddy's internal CA across restarts
    networks:
      - qc-net
    depends_on:
      qc-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ── Local DNS — friendly hostname on the plant LAN ───────────
  # Resolves ${QC_DOMAIN} to the RPi's *current* DHCP IP (interface-name; no
  # hardcoded address). network_mode: host is required so it can read the host
  # interface's live address and bind :53 on the LAN — a bridged container would
  # only see its useless internal 172.x address. Intended for the RPi; on a dev
  # laptop with Docker Desktop, host networking differs, so skip it there
  # (`docker compose ... up -d` the other services, or scale dnsmasq to 0).
  dnsmasq:
    build:
      context: ./dnsmasq
    network_mode: host
    environment:
      QC_DOMAIN: ${QC_DOMAIN:-inspection.pmp.com andon.pmp.com}
      UPSTREAM_DNS: ${UPSTREAM_DNS:-1.1.1.1}
      # LAN_IFACE: eth0   # optional — auto-detected from the default route
    restart: unless-stopped
