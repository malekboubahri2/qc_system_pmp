# =============================================================
# Painting QC — Mosquitto broker configuration
# PoC: port 1883, cleartext, password-file + ACL authentication.
# For production: add a TLS listener on 8883 and set
# APP_FEATURE_MQTT_TLS=1 in the firmware build.
# =============================================================

# -------------------------------------------------------------
# Network
# -------------------------------------------------------------
listener 1883

# Every client must present credentials. No anonymous access.
allow_anonymous false

# -------------------------------------------------------------
# Authentication & authorisation
# -------------------------------------------------------------
# Password file is managed by scripts/provision-device.sh.
# To bootstrap the server account on first deploy:
#
#   docker compose run --rm mosquitto \
#     mosquitto_passwd -c /mosquitto/config/passwd qc-server
#
# To add a device account (append, no -c):
#
#   docker compose run --rm mosquitto \
#     mosquitto_passwd /mosquitto/config/passwd qc-device-<uid>
#
# The file is bind-mounted from infra/mosquitto/passwd (gitignored).
password_file /mosquitto/config/passwd

# Topic-level access control — see acl.conf for the full policy.
acl_file /mosquitto/config/acl.conf

# -------------------------------------------------------------
# Persistence — required for retained messages to survive restart
# -------------------------------------------------------------
# Retained messages (qc/config/defects, qc/config/operators) must
# survive a broker restart so devices reconnecting after a power
# cut receive their config immediately. See ADR-003.
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Write the in-memory DB to disk every 5 minutes and on clean
# shutdown. Set to 0 for write-on-shutdown only.
autosave_interval 300
autosave_on_changes false

# -------------------------------------------------------------
# Message limits
# -------------------------------------------------------------
# Defect config + operator list payloads are well under 8 KB;
# 65536 gives generous headroom for future schema additions.
message_size_limit 65536

# Max QoS 1 messages in flight per client connection.
# 20 is the Mosquitto default; sufficient for our traffic pattern.
max_inflight_messages 20

# Max messages queued for a disconnected persistent-session client.
# The STM32 uses clean_session=false to avoid losing QoS 1 config
# updates during brief disconnects.
max_queued_messages 100

# -------------------------------------------------------------
# Logging (stdout — collected by Docker / journald)
# -------------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Log client connect/disconnect — useful for tracking device
# presence without polling qc/device/+/status.
connection_messages true

# Suppress $SYS broker statistics; nothing in the stack consumes them.
sys_interval 0
