# =============================================================
# Painting QC — Mosquitto ACL
#
# Default policy: deny everything not explicitly allowed.
# Each authenticated user must have a block below.
#
# Format:
#   user <username>
#   topic [read|write|readwrite] <topic-pattern>
#
# Wildcards:
#   +  matches exactly one topic level
#   #  matches all remaining levels (must be last token)
#
# read  = subscribe (client receives messages)
# write = publish   (client sends messages)
#
# Topic map (from docs/mqtt-topics.md):
#   qc/config/defects           server→device  QoS 1  retained
#   qc/config/operators         server→device  QoS 1  retained
#   qc/device/{id}/cmd          server→device  QoS 1
#   qc/device/{id}/status       device→server  QoS 0
#   qc/device/{id}/inspection   device→server  QoS 1
#   qc/device/{id}/session      device→server  QoS 1
#   qc/device/{id}/defect       device→server  QoS 1  (legacy)
# =============================================================


# -------------------------------------------------------------
# Server account — FastAPI MQTT bridge
# Username: qc-server
# Created once at deploy time by scripts/provision-device.sh
# -------------------------------------------------------------
user qc-server

# Publish retained defect config and operator list to all devices
topic write qc/config/#

# Send commands to individual devices
topic write qc/device/+/cmd

# Receive status heartbeats from all devices
topic read qc/device/+/status

# Receive per-part inspections and session-start events (ADR-016 / ADR-014)
topic read qc/device/+/inspection
topic read qc/device/+/session

# Receive legacy single-tap defect entries (schema 2; logged + discarded)
topic read qc/device/+/defect


# -------------------------------------------------------------
# Device account — qc-device-001 (maps to qc-stm32-001a2b3c)
#
# Generated by scripts/provision-device.sh for each provisioned
# STM32. Do not hand-edit this block; regenerate via the script.
#
# Naming convention:
#   MQTT username : qc-device-<lower8hexUID>
#   Device topic  : qc/device/qc-stm32-<lower8hexUID>/...
# -------------------------------------------------------------
user qc-device-001

# Publish status heartbeats and defect log entries for this device only
topic write qc/device/qc-stm32-001a2b3c/#

# Receive retained defect config and operator list (from server)
topic read qc/config/#

# Receive commands addressed to this device only — not other devices'
# cmd topics, even though they share the same qc/device/+/cmd namespace
topic read qc/device/qc-stm32-001a2b3c/cmd


# -------------------------------------------------------------
# Additional device accounts — added by scripts/provision-device.sh
#
# Template (copy and fill in the UID for each new device):
#
# user qc-device-<lower8hexUID>
# topic write qc/device/qc-stm32-<lower8hexUID>/#
# topic read  qc/config/#
# topic read  qc/device/qc-stm32-<lower8hexUID>/cmd
# -------------------------------------------------------------
